<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="heading"><b>Rock Paper Scissor Game</b></h1>
    <div class="img-container">
        <button id="Rock"><img id="img1" class="img" src="images/rock.png" alt="rock"></button>
        <button id="Paper"><img id="img2" class="img" src="images/paper.png" alt="rock"></button>
        <button id="Scissor"><img id="img3" class="img" src="images/scissor.webp" alt="rock"></button>
    </div>
    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Computer</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Pick Your Move</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
